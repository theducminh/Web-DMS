# VDT Zero-Trust DMS — Dev Override Compose
#
# Mục đích: Hot-reload toàn bộ stack (backend + worker + frontend + diff-engine)
# bằng cách bind-mount source code vào container và chạy watch mode native của
# từng framework. KHÔNG dùng cho production.
#
# Cách dùng:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yaml up -d
#   docker compose -f docker-compose.yml -f docker-compose.dev.yaml logs -f backend
#
# Để alias gọn hơn, đặt biến môi trường trong shell:
#   export COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yaml
# Sau đó chỉ cần: docker compose up -d
#
# ⚠️ YÊU CẦU: Code phải đặt ở Linux filesystem (~/vdt-dms/), KHÔNG phải
# /mnt/c/ hay /mnt/d/. Xem docs/WSL2_SETUP.md mục 5.2 để hiểu lý do.
#
# Cơ chế override: file này KHÔNG kế thừa Dockerfile production. Mỗi service
# override `image:` về base image gốc (node:20-alpine, python:3.12-slim), rồi
# bind-mount source + chạy command dev. node_modules dùng named volume để
# tránh host (không có) ghi đè vào container path.

services:
  # ---------------------------------------------------------------------------
  # BACKEND API — NestJS watch mode (hot reload khi sửa file trong backend/src/)
  # ---------------------------------------------------------------------------
  backend:
    image: node:20-alpine
    working_dir: /app
    command:
      - sh
      - -c
      - "apk add --no-cache openssl && npm install --no-audit --no-fund && npx prisma generate && npm run start:dev"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      APP_ROLE: api
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
      - "9229:9229"  # Node inspector cho VSCode/Chrome DevTools

  # ---------------------------------------------------------------------------
  # WORKER — Watch dist/, restart khi backend rebuild xong
  # ---------------------------------------------------------------------------
  worker:
    image: node:20-alpine
    working_dir: /app
    command:
      - sh
      - -c
      - "apk add --no-cache openssl && npm install --no-audit --no-fund && npx prisma generate && npx nodemon --watch dist --delay 2 --exec 'node dist/workers/main.worker.js'"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      APP_ROLE: worker
      NODE_ENV: development

  # ---------------------------------------------------------------------------
  # FRONTEND — Vite dev server với HMR (port 5173)
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    working_dir: /app
    command:
      - sh
      - -c
      - "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: "http://localhost:3000/api/v1"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"   # Vite dev server trực tiếp (bypass nginx khi dev)

  # ---------------------------------------------------------------------------
  # DIFF-ENGINE — uvicorn --reload watch main.py
  # ---------------------------------------------------------------------------
  diff-engine:
    image: python:3.12-slim
    working_dir: /app
    command:
      - sh
      - -c
      - "pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./diff-engine:/app
    ports:
      - "8000:8000"

  # ---------------------------------------------------------------------------
  # NGINX — vẫn dùng config production (proxy /api → backend:3000) nhưng khi
  # dev frontend, NÊN truy cập http://localhost:5173 trực tiếp để có HMR.
  # Khi muốn test end-to-end qua nginx HTTPS, run lệnh prod riêng:
  #   docker compose -f docker-compose.yml up -d --build frontend nginx
  # ---------------------------------------------------------------------------
  # (Không cần override nginx)

volumes:
  backend_node_modules:
  frontend_node_modules:
