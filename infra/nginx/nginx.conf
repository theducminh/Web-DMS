# VDT Zero-Trust DMS — Nginx Reverse Proxy (Production)
# NFR-1.1: ép TLS 1.3, HSTS, header chống XSS, Rate Limiting cổng API.
# NFR-1.2: proxy /storage/ → MinIO (giữ SigV4 sign cùng host) → tránh expose MinIO ra ngoài.
# NFR-3.2: 1-command deploy (`make up`) — toàn bộ stack lên qua compose, browser chỉ thấy 1 origin.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Spec capstone (mentor F1 Phase 6): giới hạn upload 5MB cứng.
    # Để 6m cho dư phần multipart form-data boundary overhead.
    client_max_body_size 6m;
    client_body_buffer_size 1m;

    # Buffer cho proxy response — tăng cho file download lớn (PDF watermark, ZIP release).
    proxy_buffers           16 16k;
    proxy_buffer_size       16k;
    proxy_read_timeout      300s;
    proxy_send_timeout      300s;

    # Rate limiting: chống brute-force / lạm dụng API
    # 20r/s ổn cho user thật; burst 40 absorb spike. Tăng nếu UI có poll dày đặc.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    # Auth limit riêng (login/register/forgot-password) — siết hơn để chống brute-force
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # ---- Upstream ----
    upstream nestjs_backend {
        server backend:3000;
        keepalive 32;
    }
    upstream react_frontend {
        server frontend:80;
    }
    upstream minio_s3 {
        server minio:9000;
        keepalive 32;
    }

    # ---- HTTP → HTTPS redirect ----
    server {
        listen 80;
        server_name dms.viettel.local localhost _;
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS ----
    server {
        listen 443 ssl;
        http2 on;
        server_name dms.viettel.local localhost _;

        # --- SSL/TLS ---
        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;

        # ÉP BUỘC CHỈ TLS 1.3 (NFR-1.1) — loại bỏ hoàn toàn TLS 1.2/1.1/1.0
        # Note: ssl_ciphers directive chỉ áp cho TLS ≤ 1.2 và sẽ fail với TLS 1.3-only names.
        # TLS 1.3 ciphers do nginx auto-select từ openssl default list (AES_256_GCM, CHACHA20).
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # --- Security Headers (Defense in Depth) ---
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        # X-Frame-Options DENY → bị ghi đè bởi SAMEORIGIN của backend cho route preview iframe.
        # Để SAMEORIGIN cho phép frontend iframe-self khi xem PDF preview.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # =====================================================================
        # 1) API gateway → NestJS
        # =====================================================================
        # Auth endpoints siết rate-limit riêng (5r/s thay vì 20r/s)
        location ~ ^/api/v1/auth/(login|register-request|verify-register-otp|forgot-password-request|reset-password-confirm)$ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://nestjs_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }

        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://nestjs_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Streaming response (audit export CSV/PDF, file download) — tắt buffer
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # =====================================================================
        # 2) MinIO storage proxy (presigned URL từ browser qua HTTPS cùng origin)
        #
        #     SigV4 ký TOÀN BỘ path + host. Nếu rewrite path Nginx → signature mismatch.
        #     Vì vậy KHÔNG strip prefix mà serve bucket dưới root path đúng tên:
        #       Backend ký endpoint = https://<host>   (KHÔNG có /storage prefix)
        #       URL gen ra = https://<host>/<bucket>/<key>?X-Amz-Signature=...
        #       Browser hit → Nginx forward NGUYÊN VẸN path → MinIO recompute khớp.
        #
        #     Match regex theo tên bucket (MINIO_BUCKET = vdt-docs).
        #     Nếu đổi tên bucket → cập nhật regex bên dưới.
        # =====================================================================
        location ~ ^/(vdt-docs)/ {
            proxy_pass http://minio_s3;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # File lớn → tắt buffer + tăng timeout
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_max_temp_file_size 0;
            client_max_body_size 6m;
        }

        # =====================================================================
        # 3) SPA React (mọi route còn lại) — Nginx frontend container đã có
        #    `try_files $uri $uri/ /index.html;` để hỗ trợ React Router.
        # =====================================================================
        location / {
            proxy_pass http://react_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection      "";
        }

        # =====================================================================
        # Health check endpoint (cho external load balancer)
        # =====================================================================
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
